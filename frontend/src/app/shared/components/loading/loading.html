<div class="flex flex-col items-center justify-center min-h-[200px] gap-4">
  <!-- Spinner vòng tròn -->
  <div class="relative w-16 h-16">
    <div class="absolute inset-0 border-4 border-gray-200 rounded-full"></div>
    <div class="absolute inset-0 border-4 border-t-green-500 border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Text loading -->
  <div class="flex items-center gap-2 text-gray-600">
    <span class="text-sm font-medium">Đang tải</span>
    <span class="flex gap-1">
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-bounce [animation-delay:0ms]"></span>
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-bounce [animation-delay:150ms]"></span>
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-bounce [animation-delay:300ms]"></span>
    </span>
  </div>
</div>
