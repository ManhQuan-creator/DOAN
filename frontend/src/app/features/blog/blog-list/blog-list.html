<div class="w-full h-50 flex items-center justify-center"
     style="background-image: url('assets/background.jpg'); background-size: cover; background-position: center">
  <div class="w-full h-full flex items-center justify-center bg-[#00000068]">
    <h1 class="font-bold mb-4 text-white text-[20px] sm:text-2xl lg:text-4xl">
      {{ 'BLOG.TITLE' | translate }}
    </h1>
  </div>
</div>
<!--Trang dau-->
<section class="px-5 py-8 bg-[#f9f9f9] xl:px-[10%]">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let post of posts"
         class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-500 group">
      <!-- Image -->
      <a [routerLink]="'/blog/' + post.path" class="block overflow-hidden">
        <img [src]="post.image" [alt]="post.titleKey | translate"
             class="w-full h-52 object-cover group-hover:scale-110 transition-transform duration-500">
      </a>

      <!-- Content -->
      <div class="p-5">
        <!-- Date -->
        <div class="flex items-center gap-2 text-gray-400 text-sm mb-3">
          <i class="text-green-500"><app-icon name="calendar"></app-icon></i>
          <span>{{ post.date }}</span>
        </div>

        <!-- Title -->
        <a [routerLink]="'/blog/' + post.path">
          <h2 class="text-lg font-bold text-gray-800 line-clamp-2 hover:text-green-600 transition-colors duration-300 mb-2">
            {{ post.titleKey | translate }}
          </h2>
        </a>
        <!-- Description -->
        <p class="text-gray-500 text-sm line-clamp-2 mb-4">
          {{ post.contentKey | translate }}
        </p>

        <!-- Read More -->
        <a [routerLink]="'/blog/' + post.path"
           class="inline-flex items-center gap-1 text-green-600 text-sm font-semibold hover:text-green-700 transition-colors duration-300">
          {{ 'BLOG.READ_MORE' | translate }}
          <app-icon name="arrow-right"></app-icon>
        </a>
      </div>
    </div>
  </div>
  </section>
