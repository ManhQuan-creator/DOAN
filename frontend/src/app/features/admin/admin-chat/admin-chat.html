 <div class="flex flex-col h-full px-4 pt-4">
      <div class="py-3 px-4 flex items-center justify-between shadow-md rounded-lg bg-white mb-2 sticky top-0 z-10">
        <h1 class="text-xl font-bold text-gray-700 truncate">{{description || 'Chat Support'}}</h1>
      </div>
      <div class="flex-1 overflow-y-auto bg-gray-100 rounded-lg p-4 shadow-inner">
        <div *ngFor="let msg of messages" [class]="'flex mb-3 ' + (msg.senderType === 'ADMIN' ? 'justify-end' : 'justify-start')">
          <div class="max-w-[70%]">
            <div [class]="'px-4 py-2 rounded-2xl text-sm shadow-sm ' +
                          (msg.senderType === 'ADMIN' ? 'bg-green-500 text-white rounded-br-none' : 'bg-[#dadada] text-gray-800 rounded-bl-none')">
              {{msg.message}}
            </div>
            <p [class]="'text-[11px] mt-1 text-gray-500 ' + (msg.senderType === 'ADMIN' ? 'text-right' : '')">{{msg.createdAt}}</p>
          </div>
        </div>
        <p *ngIf="messages.length === 0" class="text-center text-gray-400">Chưa Có Tin Nhắn Nào</p>
        <div #messagesEnd></div>
      </div>
      <div class="flex items-center gap-2 mt-3 pt-3 border-t">
        <input type="text" [(ngModel)]="newMessage" placeholder="Type a message..."
               (keydown.enter)="send()"
               class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-green-400">
        <button (click)="send()" class="p-2 bg-green-500 rounded-full text-white hover:bg-green-600 transition">
          <app-icon name="send"></app-icon>
        </button>
      </div>
    </div>
