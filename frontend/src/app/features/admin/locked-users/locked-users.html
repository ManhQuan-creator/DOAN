
    <div class="flex flex-col h-full md:px-2 w-full py-4 pt-2">

  <!-- Header -->
  <div class="py-3 flex justify-between px-3 items-center w-full shadow-md bg-white md:rounded-lg mb-3">
    <h1 class="text-xl sm:text-3xl font-bold text-gray-700">Tài khoản bị khóa</h1>
    <div class="flex items-center gap-2 bg-red-500 shadow-md px-4 py-2 rounded-lg text-white font-bold">
      <i class="fas fa-users text-lg opacity-70"></i>
      <span class="text-xl">{{users.length}}</span>
    </div>
  </div>

  <!-- Table ngay sát header -->
  <div class="px-2 overflow-x-auto">
    <table class="min-w-full bg-red-600 md:rounded-t-2xl text-[13px]">
      <thead>
        <tr class="text-white text-nowrap">
          <th class="py-2 px-3 text-left">Mã</th>
          <th class="py-2 px-3 text-left">Username</th>
          <th class="py-2 px-3 text-left">Mobile</th>
          <th class="py-2 px-3 text-left">Address</th>
          <th class="py-2 px-3 text-left">Email</th>
          <th class="py-2 px-3 text-left">Zip Code</th>
          <th class="py-2 px-3 text-left">City</th>
          <th class="py-2 px-3 text-left">Password</th>
          <th class="py-2 px-3 text-left">Info</th>
          <th class="py-2 px-3 text-left">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users" class="bg-white text-xs text-gray-800 text-nowrap border-b hover:bg-red-50">
          <td class="py-2.5 px-3 text-gray-500">{{u.id}}</td>
          <td class="py-2.5 px-3 text-blue-600 font-medium">{{u.name}}</td>
          <td class="py-2.5 px-3">{{u.phone || 'Trống'}}</td>
          <td class="py-2.5 px-3">{{u.address || 'Trống'}}</td>
          <td class="py-2.5 px-3 text-green-600">{{u.email}}</td>
          <td class="py-2.5 px-3">{{u.zipcode || 'Trống'}}</td>
          <td class="py-2.5 px-3">{{u.city || 'Trống'}}</td>
          <td class="py-2.5 px-3 text-gray-400 italic">••••••••</td>
          <td class="py-2.5 px-3">
            <span class="px-2 py-1 rounded-full text-red-600 bg-red-100 border border-red-400 text-xs font-medium inline-flex items-center gap-1">
              <app-icon name="lock"></app-icon> Đã khóa
            </span>
          </td>
          <td class="py-2.5 px-3">
            <button (click)="unlock(u.id)"
                    class="bg-green-500 cursor-pointer hover:bg-green-600 text-white px-3 py-1 rounded-full text-xs transition inline-flex items-center gap-1">
              <app-icon name="check"></app-icon> Mở khóa
            </button>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="10" class="text-center text-gray-500 py-4 bg-red-50">Không có tài khoản bị khóa.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
