<div class="min-h-screen flex items-center justify-center relative 
            bg-cover bg-center"
     style="background-image: url('assets/anh.jpg');">

    <!-- Overlay tối + blur -->
    <div class="absolute inset-0 bg-black/10 "></div>

    <!-- FORM -->
    <div class="relative z-10 w-full">
        <div class="max-w-md mx-auto p-6 rounded-xl 
                    bg-white/80 backdrop-blur-md
                    shadow-lg border border-white/30">

            <div class="flex justify-center">
                <img src="assets/logo/phiethoc-1.png" 
                     alt="Logo" class="w-24 h-24">
            </div>

            <h2 class="text-3xl text-center pb-5 font-medium text-gray-700">
                Admin Đăng Nhập
            </h2>

             <div *ngIf="error" 
         class="bg-red-100 text-red-600 p-3 rounded-lg text-sm mb-4">
        {{error}}
    </div>

    <div *ngIf="!otpSent">
        <div>
            <label class="text-sm font-medium text-gray-700">
                Email<sup class="text-red-600">*</sup>
            </label>
            <input type="text" [(ngModel)]="email" name="email"
                   class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md 
                          shadow-sm focus:outline-none focus:ring-green-500 
                          focus:border-green-500 sm:text-sm"
                   placeholder="Nhập email" required>
        </div>
        <div class="mt-4">
            <label class="text-sm font-medium text-gray-700">
                Password<sup class="text-red-600">*</sup>
            </label>
            <input type="password" [(ngModel)]="password" name="password"
                   class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md 
                          shadow-sm focus:outline-none focus:ring-green-500 
                          focus:border-green-500 sm:text-sm"
                   placeholder="Nhập mật khẩu" required>
        </div>
        <button (click)="sendOtp()" 
                [disabled]="isSendingOtp"
                [class]="'h-10 w-full mt-4 font-semibold rounded ' +
                         (!isSendingOtp ? 
                          'bg-[#23ff52] hover:bg-[#00ff37] cursor-pointer text-black' : 
                          'bg-gray-300 text-gray-500 cursor-not-allowed')">
            <span *ngIf="isSendingOtp">Đang xác thực...</span>
            <span *ngIf="!isSendingOtp">Gửi mã OTP</span>
        </button>
    </div>

    <div *ngIf="otpSent">
        <div class="bg-green-50 border border-green-300 rounded-lg p-4 mb-4 
                    text-center">
            <p class="text-green-700 font-semibold">OTP đã gửi</p>
            <p class="text-gray-600 text-sm mt-1">
                Mã xác nhận đã được gửi đến hộp thư
                <strong>{{email}}</strong>.
            </p>
           
        </div>

        <div>
            <label class="text-sm font-medium text-gray-700">
                Nhập mã OTP<sup class="text-red-600">*</sup>
            </label>
            <input type="text" [(ngModel)]="otp" name="otp"
                   placeholder="Nhập mã 6 số" maxlength="6"
                   class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md 
                          shadow-sm focus:outline-none focus:ring-green-500 
                          focus:border-green-500 text-center text-2xl tracking-widest"
                   (keydown.enter)="verifyOtp()">
            <p class="text-gray-400 text-xs mt-1 text-center">
                OTP có hiệu lực trong 5 phút
            </p>
        </div>

        <button (click)="verifyOtp()" 
                [disabled]="isLoading"
                [class]="'h-10 w-full mt-4 font-semibold rounded ' +
                         (!isLoading ? 
                          'bg-[#23ff52] hover:bg-[#00ff37] cursor-pointer text-black' : 
                          'bg-gray-300 text-gray-500 cursor-not-allowed')">
            <span *ngIf="isLoading"> Đang xác nhận...</span>
            <span *ngIf="!isLoading"> Xác nhận đăng nhập</span>
        </button>

        <button (click)="resendOtp()"
                class="w-full mt-2 text-sm text-green-600 hover:underline 
                       cursor-pointer">
            Chưa nhận được OTP? Gửi lại
        </button>
    </div>
            
        </div>
    </div>
</div>
