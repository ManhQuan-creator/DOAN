 <div class="flex flex-col md:px-2 w-full py-4 pt-2">
      <div class="py-3 flex justify-between px-3 items-center w-full shadow-md bg-white md:rounded-lg">
        <h1 class="text-xl sm:text-3xl font-bold text-gray-700">Hỗ Trợ Khách Hàng</h1>
        <div class="bg-green-500 shadow-md px-4 py-2 rounded-lg text-white font-bold">{{chats.length}}</div>
      </div>
    </div>
    <div class="bg-white md:px-10 py-6">
      <div class="overflow-x-auto">
        <table class="min-w-full bg-[#1ba000] md:rounded-t-2xl text-[13px]">
          <thead><tr class="text-white">
            <th class="py-2 px-2 text-left">Mã</th>
            <th class="py-2 px-2 text-left">Mô Tả</th>
            <th class="py-2 px-2 text-left">Tin Nhắn Cuối</th>
            <th class="py-2 px-2 text-left">Thông Tin</th>
          </tr></thead>
          <tbody>
            <tr *ngFor="let c of chats" 
             [class]="'text-xs text-gray-800 text-nowrap border-b ' + (hasUnread(c.id) ? 'bg-yellow-50' : 'bg-white')">
              <td class="py-2 px-2 text-gray-500">{{c.id}}</td>
                    <td class="py-2 px-2 font-medium">
            <div class="flex items-center gap-2">
              {{c.description}}
              <!-- Badge thông báo tin nhắn mới -->
              <span *ngIf="hasUnread(c.id)" 
                    class="inline-flex items-center justify-center w-5 h-5 text-xs font-bold text-white bg-red-500 rounded-full animate-pulse">
                !
              </span>
            </div>
          </td>
          <td class="py-2 px-2 max-w-xs truncate">
            <span [class]="hasUnread(c.id) ? 'font-semibold text-green-700' : 'text-gray-500'">
              {{c.lastMessage || 'Chưa có tin nhắn'}}
            </span>
          </td>
          <td class="py-2 px-2">
            <span [class]="'border px-2 py-1 rounded-full text-xs font-bold ' +
                  (c.status === 1 ? 'border-green-600 text-green-600 bg-green-100' : 
                                   'border-red-600 text-red-600 bg-red-100')">
              {{c.statusName}}
            </span>
          </td>
          <td class="py-2 px-2">
            <a [routerLink]="'/admin/support/chat/' + c.id + '/' + c.description"
               (click)="markAsRead(c.id)">
              <i class="cursor-pointer border-[#1ba000] bg-[#1ba0008e] border text-[15px] py-1 px-2 rounded-[10px] text-white">
                <app-icon name="computer"></app-icon>
                  </i>
                </a>
              </td>
            </tr>
             <tr *ngIf="chats.length === 0">
          <td colspan="5" class="text-center py-4 bg-gray-50 text-gray-500">Chưa có cuộc hội thoại nào.</td>
        </tr>
          </tbody>
        </table>
      </div>
    </div>
