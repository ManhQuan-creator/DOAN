<div class="flex flex-col md:flex-row min-h-screen bg-gray-100">
    <!-- Ảnh nền bên trái -->
    <div class="w-full md:w-2/4">
        <img src="assets/auth/background-login.jpg" alt="Background"
             class="object-cover object-left h-full w-full">
    </div>

    <div class="flex flex-col items-center justify-start w-full md:w-2/4
                max-h-screen bg-white py-4 px-4 overflow-y-auto">

        <div (click)="goHome()"
             class="cursor-pointer mr-auto ml-0 md:ml-4 text-gray-500 font-semibold">
            <i class="text-[12px]"><app-icon name="arrowleft"></app-icon></i>
            <span class="text-[12px] font-bold"> Quay lại</span>
        </div>

        <img src="assets/logo/phiethoc-1.png" alt="Logo"
             class="w-32 h-32 object-contain md:mb-6">


        <div *ngIf="message"
             class="text-red-500 text-sm mb-4 border border-red-50 p-1 rounded-lg
                    bg-red-100 flex justify-between w-full max-w-md">
            <div>
                <strong class="text-[13px]">Chú ý: </strong>
                <span class="text-[12px]">{{ message }}</span>
            </div>
            <i class="cursor-pointer text-red-500 hover:text-red-700"
               (click)="message = ''">
                <app-icon name="close"></app-icon>
            </i>
        </div>

        <div *ngIf="registerSuccess"
             class="w-full max-w-md text-center">
            <div class="bg-green-50 border border-green-400 rounded-xl p-8 shadow-sm">
              
                <h3 class="text-xl font-bold text-green-700 mb-2">
                    Đăng ký thành công!
                </h3>
                <p class="text-gray-600 text-sm mb-1">
                    Tài khoản của bạn đã được tạo thành công.
                </p>
                <p class="text-gray-500 text-sm mb-6">
                    Đang chuyển đến trang đăng nhập...
                </p>
                <div class="flex justify-center gap-1 mb-6">
                    <span class="w-2 h-2 bg-green-500 rounded-full 
                                 animate-bounce [animation-delay:0ms]"></span>
                    <span class="w-2 h-2 bg-green-500 rounded-full 
                                 animate-bounce [animation-delay:150ms]"></span>
                    <span class="w-2 h-2 bg-green-500 rounded-full 
                                 animate-bounce [animation-delay:300ms]"></span>
                </div>

                <button (click)="goToSignin()"
                        class="bg-[#23ff52] hover:bg-[#00ff37] text-black font-semibold
                               py-2 px-6 rounded-lg cursor-pointer transition-colors">
                    Đăng nhập ngay →
                </button>
            </div>
        </div>

        <div *ngIf="!otpSent && !registerSuccess" class="w-full max-w-md">
            <form class="grid grid-cols-2 gap-4 md:my-4">
                <!-- Họ -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Họ <sup class="text-red-600">*</sup>
                    </label>
                    <input type="text" [(ngModel)]="lastname" name="lastname"
                           class="mt-1 w-full px-3 py-2 border border-gray-300
                                  rounded-md shadow-sm focus:outline-none
                                  focus:ring-green-500 focus:border-green-500 sm:text-sm"
                           placeholder="Nhập họ...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Tên <sup class="text-red-600">*</sup>
                    </label>
                    <input type="text" [(ngModel)]="firstname" name="firstname"
                           class="mt-1 w-full px-3 py-2 border border-gray-300
                                  rounded-md shadow-sm focus:outline-none
                                  focus:ring-green-500 focus:border-green-500 sm:text-sm"
                           placeholder="Nhập tên...">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700">
                        Email <sup class="text-red-600">*</sup>
                    </label>
                    <input type="email" [(ngModel)]="email" name="email"
                           class="mt-1 w-full px-3 py-2 border border-gray-300
                                  rounded-md shadow-sm focus:outline-none
                                  focus:ring-green-500 focus:border-green-500 sm:text-sm"
                           placeholder="Nhập email...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Mật khẩu <sup class="text-red-600">*</sup>
                    </label>
                    <input type="password" [(ngModel)]="password" name="password"
                           class="mt-1 w-full px-3 py-2 border border-gray-300
                                  rounded-md shadow-sm focus:outline-none
                                  focus:ring-green-500 focus:border-green-500 sm:text-sm"
                           placeholder="Nhập mật khẩu...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Xác nhận mật khẩu <sup class="text-red-600">*</sup>
                    </label>
                    <input type="password" [(ngModel)]="confirmPassword"
                           name="confirmPassword"
                           class="mt-1 w-full px-3 py-2 border border-gray-300
                                  rounded-md shadow-sm focus:outline-none
                                  focus:ring-green-500 focus:border-green-500 sm:text-sm"
                           placeholder="Nhập lại mật khẩu...">
                </div>
            </form>
            <div class="flex items-center mt-2">
                <input [(ngModel)]="agreePolicy" type="checkbox" id="agree">
                <label for="agree" class="ml-2 text-sm text-gray-700">
                    Tôi đồng ý với
                    <a routerLink="/viserbus/policy/privacy-policy"
                       class="text-green-600 hover:underline">chính sách bảo mật</a>
                </label>
            </div>
            <button (click)="sendOtp()"
                    [disabled]="!agreePolicy || isSendingOtp"
                    [class]="'h-10 w-full mt-4 font-semibold rounded transition-colors '
                           + (agreePolicy && !isSendingOtp
                              ? 'bg-[#23ff52] hover:bg-[#00ff37] cursor-pointer text-black'
                              : 'bg-gray-200 text-gray-400 cursor-not-allowed')">
                <span *ngIf="isSendingOtp">
                    <app-icon name="loading"></app-icon> Đang gửi OTP...
                </span>
                <span *ngIf="!isSendingOtp">Gửi mã OTP xác nhận</span>
            </button>

            <p class="text-sm text-gray-500 mt-3 mb-10 text-center">
                Đã có tài khoản?
                <a routerLink="/signin" class="text-blue-500 hover:underline">
                    Đăng nhập
                </a>
            </p>
        </div>
        <div *ngIf="otpSent && !registerSuccess" class="w-full max-w-md">
            <div class="bg-green-50 border border-green-300 rounded-lg p-4 mb-4 text-center">
                <p class="text-green-700 font-semibold">📧 OTP đã được gửi!</p>
                <p class="text-gray-600 text-sm mt-1">
                    Mã xác nhận đã được gửi đến
                    <strong>{{ email }}</strong>.
                    Vui lòng kiểm tra hộp thư.
                </p>
            </div>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="font-medium text-gray-700">
                        Nhập mã OTP <sup class="text-red-500">*</sup>
                    </label>
                    <input type="text" [(ngModel)]="otp" name="otp"
                           placeholder="• • • • • •"
                           maxlength="6"
                           (keydown.enter)="signup()"
                           class="mt-1 w-full p-3 border border-gray-300 rounded-lg
                                  shadow-sm focus:outline-none focus:ring-2
                                  focus:ring-green-400 text-center text-2xl
                                  tracking-widest">
                    <p class="text-gray-400 text-xs mt-1 text-center">
                        ⏱ OTP có hiệu lực trong 5 phút
                    </p>
                </div>
                <button (click)="signup()"
                        [disabled]="isLoading"
                        [class]="'h-10 w-full font-semibold rounded transition-colors '
                               + (!isLoading
                                  ? 'bg-[#23ff52] hover:bg-[#00ff37] cursor-pointer text-black'
                                  : 'bg-gray-200 text-gray-400 cursor-not-allowed')">
                    <span *ngIf="isLoading">
                        <app-icon name="loading"></app-icon> Đang tạo tài khoản...
                    </span>
                    <span *ngIf="!isLoading"> Xác nhận & Đăng ký</span>
                </button>
                <button (click)="resendOtp()"
                        class="text-sm text-green-600 hover:underline cursor-pointer text-center">
                    Chưa nhận được OTP? Gửi lại
                </button>
                <button (click)="otpSent = false"
                        class="text-sm text-gray-500 hover:underline cursor-pointer text-center">
                     Quay lại chỉnh sửa thông tin
                </button>
            </div>
        </div>

    </div>
</div>
