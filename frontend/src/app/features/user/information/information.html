<div class="w-full min-h-screen flex items-center justify-center relative bg-gray-400 bg-center">
  <div class="absolute inset-0 bg-center bg-cover bg-no-repeat"
    style="background-image: url('assets/background.jpg')"></div>
  <div class="absolute inset-0 backdrop-blur-md bg-black/20"></div>

  <!-- Loading khi tự động redirect -->
  <div *ngIf="isLoggedIn && !needsInfo" 
    class="bg-white p-10 rounded-lg shadow-lg z-10 relative text-center">
    <app-icon name="loading" class="text-3xl text-green-500"></app-icon>
    <p class="mt-4 text-gray-600">Đang xử lý thông tin...</p>
  </div>

  <!-- Form chỉ hiện khi đã đăng nhập nhưng thiếu thông tin, HOẶC là guest -->
  <form *ngIf="!isLoggedIn || needsInfo"
    (ngSubmit)="submit()" 
    class="bg-white my-[10%] mx-[5%] p-6 rounded-lg shadow-lg w-full max-w-lg z-10 relative">
    
    <h1 class="text-sm md:text-2xl font-bold mb-3 md:mb-6 text-center">
      {{ 'GUEST.TITLE' | translate }}
    </h1>

    <!-- Thông báo cho user đã đăng nhập biết cần bổ sung -->
    <div *ngIf="isLoggedIn && needsInfo" 
      class="bg-yellow-50 border border-yellow-400 text-yellow-700 p-3 rounded-lg mb-4 text-sm">
      Vui lòng bổ sung thông tin còn thiếu để hoàn tất đặt vé.
    </div>

    <div *ngIf="message" class="text-red-500 text-sm mb-4 border border-red-500 p-3 rounded-lg bg-red-100 flex justify-between">
      <span>{{message}}</span>
      <i class="cursor-pointer text-red-500" (click)="message = ''">
        <app-icon name="close"></app-icon>
      </i>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">{{ 'GUEST.FULLNAME' | translate }}</label>
      <input type="text" [(ngModel)]="fullName" name="fullName" required
        class="w-full border rounded px-3 py-2 mt-1" 
        placeholder="Nguyen Van A"
        [readonly]="isLoggedIn && !!fullName">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">{{ 'GUEST.PHONE' | translate }}</label>
      <input type="text" [(ngModel)]="phone" name="phone" required 
        class="w-full border rounded px-3 py-2 mt-1"
        placeholder="0901234567">
    </div>

    <div class="mb-4" *ngIf="!isLoggedIn">
      <label class="block text-sm font-medium text-gray-700">{{ 'GUEST.EMAIL' | translate }}</label>
      <input type="email" [(ngModel)]="email" name="email" required 
        class="w-full border rounded px-3 py-2 mt-1" 
        placeholder="example@gmail.com">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">{{ 'GUEST.CCCD' | translate }}</label>
      <input type="text" [(ngModel)]="cccd" name="cccd" required 
        class="w-full border rounded px-3 py-2 mt-1" 
        placeholder="012345678901">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">{{ 'GUEST.BIRTHDAY' | translate }}</label>
      <input type="date" [(ngModel)]="birthday" name="birthday" required
        class="w-full border rounded px-3 py-2 mt-1">
    </div>

    <button type="submit" [disabled]="isLoading"
      [class]="'w-full font-bold rounded-lg py-3 text-white flex items-center justify-center gap-2 ' +
      (isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-green-500 to-green-600 cursor-pointer')">
      <span *ngIf="isLoading"><app-icon name="loading"></app-icon>{{ 'COMMON.PROCESSING' | translate }}</span>
      <span *ngIf="!isLoading">{{ 'COMMON.CONFIRM' | translate }}</span>
    </button>
  </form>
</div>
