<!-- Banner -->
<div class="w-full h-48 flex items-center justify-center bg-cover bg-center relative"
     style="background-image: url('assets/background.jpg')">
  <div class="absolute inset-0 bg-black/40"></div>
  <h1 class="relative z-10 text-white text-2xl sm:text-3xl lg:text-4xl font-bold">Cài đặt hồ sơ</h1>
</div>

<!-- Main Card -->
<div class="border-dashed border-green-300 md:border md:mx-20 p-6 sm:p-10 bg-white rounded-2xl shadow-xl md:my-5 relative z-20">
  <div class="flex max-md:flex-col justify-between items-center mb-6">
    <h2 class="text-xl sm:text-2xl font-bold">Thông tin cá nhân</h2>
    <div *ngIf="error" class="bg-red-100 text-red-600 p-2 rounded-lg text-sm">{{error}}</div>
    <div *ngIf="success" class="bg-green-100 text-green-600 p-2 rounded-lg text-sm">{{success}}</div>
  </div>

  <div class="flex flex-col md:flex-row gap-8">
    <!-- Avatar -->
    <div class="flex flex-col items-center md:w-1/3 gap-4 justify-center">
      <img [src]="avatarUrl" class="w-24 h-24 sm:w-32 sm:h-32 object-cover rounded-xl border-4 border-green-500 shadow-md">
      <label for="img" class="flex items-center gap-2 px-4 py-2 bg-green-100 hover:bg-green-200 text-green-700 rounded-lg cursor-pointer text-sm font-medium transition">
        <app-icon name="download"></app-icon> Upload
      </label>
      <input type="file" id="img" (change)="onFileChange($event)" class="hidden" accept="image/png,image/jpeg,image/jpg,image/webp">
      <p class="font-medium text-center">{{nameValue}}</p>
    </div>

    <!-- Form -->
    <form class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
      <div class="md:col-span-2">
        <label class="font-medium">Tên Người Dùng <sup class="text-red-500">*</sup></label>
        <input type="text" [(ngModel)]="nameValue" name="name"
               class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
      </div>
      <div>
        <label class="font-medium">Quốc Gia <sup class="text-red-500">*</sup></label>
        <select [(ngModel)]="countryValue" name="country" (ngModelChange)="onCountryChange()"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
          <option *ngFor="let opt of countryOptions" [value]="opt.value">{{opt.label}}</option>
        </select>
      </div>
      <div>
        <label class="font-medium">Số Điện Thoại <sup class="text-red-500">*</sup></label>
        <div class="flex mt-1">
          <span class="px-3 py-2 bg-gray-200 border border-gray-300 rounded-l-lg">{{countryCode}}</span>
          <input type="text" [(ngModel)]="phoneValue" name="phone" maxlength="10" placeholder="Phone"
                 class="flex-1 border border-gray-300 rounded-r-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
        </div>
      </div>
      <div>
        <label class="font-medium">Địa Chỉ</label>
        <input type="text" [(ngModel)]="addressValue" name="address" placeholder="Address"
               class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
      </div>
      <div>
        <label class="font-medium">Email</label>
        <input type="text" [value]="emailValue" disabled
               class="mt-1 w-full border border-gray-300 rounded-lg p-2 bg-gray-100 cursor-not-allowed">
      </div>
      <div>
        <label class="font-medium">Mã</label>
        <input type="text" [(ngModel)]="zipcodeValue" name="zipcode" placeholder="Zip Code"
               class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
      </div>
      <div>
        <label class="font-medium">Thành Phố</label>
        <input type="text" [(ngModel)]="cityValue" name="city" placeholder="City"
               class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none">
      </div>
    </form>
  </div>

  <!-- Buttons -->
  <div class="sm:px-10 px-2 md:mt-4 mt-2 flex gap-4">
    <button (click)="save()" class="rounded-lg w-full h-10 cursor-pointer flex items-center justify-center border border-green-500 bg-green-500 text-white hover:bg-green-600">
      Cập Nhâp <app-icon name="upload" class="ml-2"></app-icon>
    </button>
    <button (click)="logout()" class="rounded-lg w-full h-10 cursor-pointer flex items-center justify-center border border-red-500 bg-red-500 text-white hover:bg-red-600">
      Đăng Xuất <app-icon name="logout" class="ml-2"></app-icon>
    </button>
  </div>
</div>
