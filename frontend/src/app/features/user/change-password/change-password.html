<div class="w-full h-48 flex items-center justify-center bg-cover bg-center relative"
     style="background-image: url('assets/background.jpg')">
    <div class="absolute inset-0 bg-black/50"></div>
    <h1 class="relative z-10 text-2xl sm:text-3xl lg:text-4xl font-bold text-white">Change Password</h1>
</div>

<div class="sm:px-[5%] lg:px-[15%] xl:px-[30%] my-6">
    <form (ngSubmit)="submit()" class="rounded-2xl md:shadow-lg p-6 flex flex-col gap-6 bg-white">
        <div *ngIf="error" class="bg-red-100 text-red-600 p-3 rounded-lg text-sm">{{error}}</div>
        <div *ngIf="success" class="bg-green-100 text-green-600 p-3 rounded-lg text-sm">{{success}}</div>

        <!-- Step 1: Send OTP -->
        <div *ngIf="!otpSent" class="flex flex-col gap-3">
            <p class="text-gray-600 text-sm">Để đổi mật khẩu, bạn cần xác nhận OTP gửi về email.</p>
            <button type="button" (click)="sendOtp()" [disabled]="isSendingOtp"
                    [class]="'h-11 rounded-lg font-semibold transition ' +
                    (!isSendingOtp ? 'bg-blue-500 hover:bg-blue-600 text-white cursor-pointer' : 'bg-gray-300 text-gray-500 cursor-not-allowed')">
                <span *ngIf="isSendingOtp"><app-icon name="loading"></app-icon> Đang gửi OTP...</span>
                <span *ngIf="!isSendingOtp">Gửi mã OTP</span>
            </button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div *ngIf="otpSent && !otpVerified" class="flex flex-col gap-3">
            <label class="font-medium">Nhập mã OTP <sup class="text-red-500">*</sup></label>
            <input type="text" [(ngModel)]="otp" name="otp" placeholder="Nhập mã 6 số"
                   maxlength="6"
                   class="p-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 text-center text-2xl tracking-widest">
            <div class="flex gap-3">
                <button type="button" (click)="verifyOtp()"
                        class="flex-1 h-11 rounded-lg font-semibold bg-green-500 hover:bg-green-600 text-white cursor-pointer transition">
                    Xác nhận OTP
                </button>
                <button type="button" (click)="sendOtp()" [disabled]="isSendingOtp"
                        class="h-11 px-4 rounded-lg font-semibold border border-gray-300 hover:bg-gray-100 cursor-pointer transition text-sm">
                    Gửi lại
                </button>
            </div>
        </div>

        <!-- Step 3: Change Password (chỉ hiện khi đã verify OTP) -->
        <div *ngIf="otpVerified">
            <div *ngIf="hasPassword" class="flex flex-col mb-4">
                <label class="font-medium">Current Password <sup class="text-red-500">*</sup></label>
                <input type="password" [(ngModel)]="currentPassword" name="currentPassword"
                       placeholder="Current password"
                       class="mt-1 p-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400">
            </div>

            <div class="flex flex-col mb-4">
                <label class="font-medium">New Password <sup class="text-red-500">*</sup></label>
                <input type="password" [(ngModel)]="newPassword" name="newPassword"
                       placeholder="New password (min 10 chars)"
                       class="mt-1 p-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400">
            </div>

            <div class="flex flex-col mb-4">
                <label class="font-medium">Confirm Password <sup class="text-red-500">*</sup></label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                       placeholder="Confirm password"
                       class="mt-1 p-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400">
            </div>

            <button type="submit" [disabled]="isLoading"
                    [class]="'h-11 w-full rounded-lg font-semibold transition ' +
                    (!isLoading ? 'bg-green-500 hover:bg-green-600 text-white cursor-pointer' : 'bg-gray-300 text-gray-500 cursor-not-allowed')">
                <span *ngIf="isLoading"><app-icon name="loading"></app-icon> Processing...</span>
                <span *ngIf="!isLoading">Change Password</span>
            </button>
        </div>
    </form>
</div>
